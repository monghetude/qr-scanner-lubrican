<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="https://loveyourself.ph/wp-content/uploads/2020/10/cropped-Favicon-LoveYourself.png">
  <link rel="shortcut icon" href="https://loveyourself.ph/wp-content/uploads/2020/10/cropped-Favicon-LoveYourself.png">

  <title>LubriCan! Seed ID Scanner</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>
  
<div id="outerBox">

  <div style="text-align:center;">
    <img src="https://loveyourself.ph/wp-content/uploads/2025/11/Love-Gala-QR-Cover-2.png"
         style="border-radius:12px; max-width:100%;">
  </div>

  <h2 style="color:#B76E79;">LubriCan! Seed ID Scanner</h2>

  <button id="startScanBtn">Start Scanner</button>
  <button id="stopScanBtn" style="display:none; background:#ff9194;">Stop</button>

  <div id="qr-reader" style="width:300px; margin:15px auto;"></div>

  <div id="result"></div>

  <div id="toast"></div>

</div>

<script src="script.js"></script>
</body>
</html>
