<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="https://loveyourself.ph/wp-content/uploads/2020/10/cropped-Favicon-LoveYourself.png">
  <link rel="shortcut icon" href="https://loveyourself.ph/wp-content/uploads/2020/10/cropped-Favicon-LoveYourself.png">
  <title>LubriCan! Seed ID Scanner</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<!-- MAIN BODY -->
<body>
  
<div id="outerBox">

  <div style="text-align:center;">
    <img src="https://loveyourself.ph/wp-content/uploads/2025/11/Love-Gala-QR-Cover-2.png"
         style="border-radius:12px; max-width:100%;">
  </div>

  <h2 style="color:#0C1134;">LubriCan! Seed ID Scanner</h2>

  <div id="main-section" style="margin-bottom:15px;">    
    <div style="display:flex; justify-content:center; align-items:center;">
      <div style="display:flex; gap:20px; align-items:center; font-family:sans-serif;">
        <label class="switch">
          <input type="checkbox" id="modeSwitch" checked>
          <span class="slider round"></span>
        </label>
        <span id="modeLabel" style="color:#0C1134;">Scan Mode</span>
      </div>
    </div>
  </div>

  <!-- Scan Section -->
  <div id="scanSection" style="display:none;">
  <button id="startScanBtn">Start Scanner</button>
  <button id="uploadQRBtn">Upload QR</button>
  <button id="stopScanBtn" style="display:none; background:#ff9194;">Stop</button>
  <input type="file" id="qr-upload" accept="image/*" style="display:none;" />
  <div id="qrReaderContainer" style="position:relative; width: 300px; margin: 0 auto;">
    <div id="qr-reader" style="width:300px; margin:15px auto;"></div>
    <button id="flipCamBtn" style="display:none; position:absolute; top:10px; right:10px; background-color:rgba(0,0,0,0.5); color:white; border:none; border-radius:50%; width:40px; height:40px; cursor:pointer;">
    🔄
    </button>
  </div>
  <div id="result"></div>
  </div>
  
  <!-- Manual Search Section -->
  <div id="manualSection" style="display:none; align-items:center;">
  <div style="display: flex; justify-content: center; gap: 7px; align-items: center;">  
  <textarea id="gIdManual" rows="1" placeholder="Please enter Seed ID (e.g., CBO-0001)" style="height: 35px;
    width: 300px;
    border-radius: 8px; 
    font-family: Arial, sans-serif; 
    border: 2px solid; 
    resize: none; 
    line-height: 30px; 
    padding: 0 10px; 
    box-sizing: border-box; "></textarea>
  <button id="searchManual" style="height: 35px; width: 100px; border-radius: 10px; padding: 3px;">Search</button>
  </div>
  <div id="manualResult"></div>
  </div>

  <div id="toast"></div>

  <div id="confirmModal" class="modal">
  <div class="modal-content">
    <div class="spinner"></div>
    <h3>Analyzing data...</h3>
    </div>
  </div>
  
</div>

<script src="script.js"></script>
</body>
</html>
